    <script>
        (function passwordStrength() {
            var pwd = document.getElementById('signup-password');
            var fill = document.getElementById('password-strength-fill');
            var label = document.getElementById('password-strength-label');
            if (!pwd || !fill || !label) return;
            function evaluate(p) {
                if (!p || p.length === 0) return { level: 0, text: '—' };
                var score = 0;
                if (p.length >= 8) score++;
                if (p.length >= 12) score++;
                if (/[a-z]/.test(p) && /[A-Z]/.test(p)) score++;
                if (/\d/.test(p)) score++;
                if (/[^A-Za-z0-9]/.test(p)) score++;
                if (score <= 2) return { level: 1, text: 'Weak' };
                if (score <= 4) return { level: 2, text: 'Medium' };
                return { level: 3, text: 'Strong' };
            }
            pwd.addEventListener('input', function() {
                var r = evaluate(this.value);
                fill.className = 'password-strength-fill';
                if (r.level > 0) fill.classList.add(r.level === 1 ? 'weak' : r.level === 2 ? 'medium' : 'strong');
                label.querySelector('span').textContent = r.text;
            });
        })();
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            const passwordInput = form.querySelector('input[name="password"]');
            const confirmInput = form.querySelector('input[name="password_confirm"]');
            const passwordError = document.getElementById('password-error');
            const formError = document.getElementById('form-error');

            function showPasswordError(message) {
                if (passwordError) {
                    passwordError.textContent = message;
                    passwordError.style.display = 'block';
                }
            }

            function hidePasswordError() {
                if (passwordError) {
                    passwordError.style.display = 'none';
                }
            }

            function showFormError(message) {
                if (formError) {
                    formError.textContent = message;
                    formError.style.display = 'block';
                }
            }

            function hideFormError() {
                if (formError) {
                    formError.style.display = 'none';
                }
            }

            if (form && passwordInput && confirmInput) {
                form.addEventListener('submit', function(event) {
                    hideFormError();
                    if (passwordInput.value !== confirmInput.value) {
                        event.preventDefault();
                        showPasswordError('Passwords do not match.');
                        confirmInput.focus();
                    } else {
                        hidePasswordError();
                    }
                });

                confirmInput.addEventListener('input', hidePasswordError);
                passwordInput.addEventListener('input', hidePasswordError);
            }

            const params = new URLSearchParams(window.location.search);
            const errorCode = params.get('error');
            if (errorCode) {
                switch (errorCode) {
                    case 'password_mismatch':
                        showPasswordError('Passwords do not match.');
                        break;
                    case 'password_length':
                        showFormError('Password must be at least 8 characters long.');
                        break;
                    case 'required':
                        showFormError('All required fields must be filled out.');
                        break;
                    case 'duplicate':
                        showFormError('Email or username already exists.');
                        break;
                    case 'server':
                        showFormError('Unable to process your sign up right now. Please try again later.');
                        break;
                    case 'invalid_surname':
                        showFormError('Invalid surname. Please use only letters, spaces, hyphens, or apostrophes.');
                        break;
                    case 'invalid_firstname':
                        showFormError('Invalid first name. Please use only letters, spaces, hyphens, or apostrophes.');
                        break;
                    case 'invalid_middle':
                        showFormError('Middle initial must be a single letter.');
                        break;
                    default:
                        showFormError('Unable to complete sign up. Please try again.');
                }
            }

            if (errorCode) {
                window.history.replaceState(null, '', window.location.pathname);
            }
        });
    </script>
