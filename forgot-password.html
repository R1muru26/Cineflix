<body class="has-background">
    <div class="background-blur"></div>

    <header class="site-header">

            <img src="logo/newlogo1.png" alt="CineFlix Logo">

        <nav class="top-nav">

                <li><a class="nav-btn" href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="login-container">
            <img src="logo/C_1_-removebg-preview.png" alt="CineFlix Logo" class="login-logo">
            <h2>Forgot Your Password?</h2>
            <p style="color: rgba(255,255,255,0.8); font-size: 0.9rem; margin-bottom: 20px; text-align: center; line-height: 1.5;">Enter your email address and we'll send you a link to reset your password.</p>
            
            <form action="forgot-password.php" method="POST">
                <input type="email" name="email" class="login-input" placeholder="Enter your email" required>

                <p id="form-error" style="display:none;color:#ff6b6b;font-size:0.9rem;margin:12px 0;text-align:center;"></p>

                <button type="submit" name="reset" class="login-btn">Send Reset Link</button>

                <a href="login.html" class="signup-link">Back to Login</a>
            </form>
        </div>
    </main>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            const formError = document.getElementById('form-error');

            function showFormError(message) {
                if (formError) {
                    formError.textContent = message;
                    formError.style.display = 'block';
                }
            }

            function hideFormError() {
                if (formError) {
                    formError.style.display = 'none';
                }
            }

            if (form) {
                form.addEventListener('submit', function(event) {
                    hideFormError();
                    const emailInput = form.querySelector('input[name="email"]');
                    if (emailInput && !emailInput.value.trim()) {
                        event.preventDefault();
                        showFormError('Please enter your email address.');
                    }
                });

                const params = new URLSearchParams(window.location.search);
                const errorCode = params.get('error');
                if (errorCode) {
                    switch (errorCode) {
                        case 'invalid_email':
                            showFormError('Please enter a valid email address.');
                            break;
                        case 'not_found':
                            showFormError('No account found with that email address.');
                            break;
                        case 'server':
                            showFormError('Unable to process your request right now. Please try again later.');
                            break;
                        default:
                            showFormError('Unable to complete your request. Please try again.');
                    }
                }

                if (errorCode) {
                    window.history.replaceState(null, '', window.location.pathname);
                }
            }
        });
    </script>
</body>
</html>
