<body class="has-background">
  <div class="background-blur"></div>
  
  <header class="site-header">
    <a class="logo" href="homepage.php">
      <img src="logo/newlogo1.png" alt="CineFlix Logo">
    </a>
    <nav class="top-nav">

        </li>
        <li><a class="nav-btn" href="status.php">Status</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="login-container">
      <img src="logo/C_1_-removebg-preview.png" alt="CineFlix Logo" class="login-logo">
      <h2>Log In to CineFlix</h2>
      <form action="login.php" method="POST" id="loginForm" novalidate>
        <input type="text" name="email" class="login-input" placeholder="Email" inputmode="email" autocomplete="username" required>
        <div class="password-field-wrapper">
          <input type="password" name="password" id="passwordField" class="login-input" placeholder="Password" autocomplete="current-password" required>
          <button type="button" class="toggle-password-btn" id="togglePassword" aria-label="Show password">
            <!-- eye icon -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5C7 5 3.3 8.1 2 12c1.3 3.9 5 7 10 7s8.7-3.1 10-7c-1.3-3.9-5-7-10-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>
            </svg>
          </button>
        </div>

        <div class="remember-row">
          <label>
            <input type="checkbox" name="remember_me" value="1">
            Remember me
          </label>
          <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
        </div>

        <div class="oauth-buttons" style="margin:16px 0;display:flex;flex-direction:column;gap:10px;">
          <!-- OAuth buttons removed - use email login only -->
        </div>

        <!-- Google reCAPTCHA widget -->
        <div class="captcha-row">
          <div class="g-recaptcha" data-sitekey="6LdGgpYsAAAAAJsiefiZWbzP_fozLcYF7ldP4FPs"></div>
        </div>

        <div id="loginError" class="error-message" style="display:none;"></div>
        <button type="submit" class="login-btn" style="-webkit-tap-highlight-color:transparent;">Log In</button>
        <a href="signup.html" class="signup-link">Sign Up</a>
      </form>
    </div>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var msg = params.get('error');
      if (msg) {
        var box = document.getElementById('loginError');
        if (box) { box.textContent = msg; box.style.display = 'block'; }
      }
    })();

    (function () {
      var toggleBtn = document.getElementById('togglePassword');
      var pwdField = document.getElementById('passwordField');
      if (!toggleBtn || !pwdField) return;
      var isVisible = false;
      toggleBtn.addEventListener('click', function () {
        isVisible = !isVisible;
        pwdField.type = isVisible ? 'text' : 'password';
        // swap eye icon (simple stroke change)
        var svg = toggleBtn.querySelector('svg');
        if (!svg) return;
        if (isVisible) {
          svg.innerHTML = '<path d="M12 5C7 5 3.3 8.1 2 12c1 2.9 3.4 5.3 6.7 6.4L6 21l1.4 1.4 3.2-3.2c.5.1 1 .1 1.4.1 5 0 8.7-3.1 10-7-.6-1.7-1.7-3.2-3.1-4.4L18 5l-1.4-1.4-2.7 2.7A9 9 0 0 0 12 5zm0 3a4 4 0 0 1 4 4c0 .7-.2 1.3-.4 1.9L13.1 11.4A2 2 0 0 0 12 9zm-4 4a4 4 0 0 1 4-4c.3 0 .7.1 1 .2L9.2 12c-.1.3-.2.6-.2 1 0 .3.1.7.2 1L8 15.2A3.9 3.9 0 0 1 8 13z"/>';
        } else {
          svg.innerHTML = '<path d="M12 5C7 5 3.3 8.1 2 12c1.3 3.9 5 7 10 7s8.7-3.1 10-7c-1.3-3.9-5-7-10-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>';
        }
      });
    })();
  </script>
