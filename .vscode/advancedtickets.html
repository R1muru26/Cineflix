<body class="has-background">

  <header class="site-header">

    <nav class="top-nav">

  <main>

      <div class="poster-card" data-trailer="https://www.youtube.com/embed/xYcgQMxQwmk?autoplay=1">
        <img src="advancedtickets/Hamnet.jpg" alt="Hamnet">
        <div class="overlay">
          <div class="overlay-content">

            <button class="poster-btn trailer-btn">Trailer</button>
            <button class="poster-btn trailer-btn">View</button>

      <div class="poster-card" data-trailer="https://www.youtube.com/embed/R2Xubj7lazE?autoplay=1">
        <img src="advancedtickets/Wicked For Good.jpg" alt="Wicked: For Good">
        <div class="overlay">
          <div class="overlay-content">
            <span class="poster-title">Wicked: For Good</span>
            <button class="poster-btn trailer-btn">Trailer</button>
                        <button class="poster-btn trailer-btn">View</button>
          </div>
        </div>

      <div class="poster-card" data-trailer="https://www.youtube.com/embed/eej34Jw7woA?autoplay=1">
        <img src="advancedtickets/Return to Silent Hill.jpg" alt="Return to Silent Hill">
        <div class="overlay">
          <div class="overlay-content">
            <span class="poster-title">Return to Silent Hill</span>
            <button class="poster-btn trailer-btn">Trailer</button>
                        <button class="poster-btn trailer-btn">View</button>

        </div>
      </div>

      <div class="poster-card" data-trailer="https://www.youtube.com/embed/EOwTdTZA8D8?autoplay=1">
        <img src="advancedtickets/28 years later.jpg" alt="28 Years Later: The Bone Temple">
        <div class="overlay">
          <div class="overlay-content">
            <span class="poster-title">28 Years Later: The Bone Temple</span>
            <button class="poster-btn trailer-btn">Trailer</button>
             <button class="poster-btn trailer-btn">View</button>
